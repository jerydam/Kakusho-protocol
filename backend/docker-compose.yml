version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Kakusho Relayer — local development stack
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up --build relayer  # relayer only (use external DB)
#   docker compose down -v             # stop + delete volumes
#
# The relayer waits for Postgres to be healthy before starting.
# On first run it applies schema.sql automatically.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL (local dev only — use Supabase in production) ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: kakusho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kakusho
      POSTGRES_USER:     kakusho
      POSTGRES_PASSWORD: kakusho_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Apply schema on first start
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kakusho -d kakusho"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Relayer ────────────────────────────────────────────────────────
  relayer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakusho-relayer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Override DATABASE_URL to point at the local postgres container
      DATABASE_URL: postgresql://kakusho:kakusho_dev@postgres:5432/kakusho
      # Copy remaining vars from .env file
    env_file:
      - .env
    volumes:
      # Mount ZK keys and CSCA list for live reload during development
      - ./zk:/app/zk:ro
      - ./data:/app/data:ro
      # Hot-reload: mount source code (remove in production image builds)
      - ./app:/app/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── pgAdmin (optional, remove if not needed) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kakusho-pgadmin
    restart: unless-stopped
    profiles: ["debug"]   # only starts with: docker compose --profile debug up
    depends_on:
      - postgres
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@kakusho.local
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: